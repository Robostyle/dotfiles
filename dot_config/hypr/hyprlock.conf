general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 0.5)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 3 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.4
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(000000)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 48
    font_family = Noto Sans

    position = 0, 400
    halign = center
    valign = center
}

