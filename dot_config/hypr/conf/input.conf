# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us,us
    kb_variant = ,colemak_dh
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    repeat_delay = 250
    repeat_rate = 60

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0.0
    accel_profile = "flat"
}

device {
    name = logitech-usb-receiver
    sensitivity = -1.0
}

device {
    name = logitech-g502-x-plus
    sensitivity = -1.0
}

