general {
    lock_cmd = pidof hyprlock || hyprlock --grace 5
    before_sleep_cmd = loginctl lock-session                                # lock before suspend.
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' # to avoid having to press a key twice to turn on the display.
    inhibit_sleep = 3                                                       # wait until screen is locked
}

listener {
    timeout = 150                                                           # 2.5min.
    on-timeout = brightnessctl -s set 10 && ddcutil setvcp 10 5             # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r && ddcutil setvcp 5 1                      # monitor backlight restore.
}

listener {
    timeout = 300                                                           # 5min
    on-timeout = loginctl lock-session                                      # lock screen when timeout has passed
}

listener {
    timeout = 330                                                           # 5.5min
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0                 # save state and turn off keyboard backlight
    on-resume = brightnessctl -rd '*::kbd_backlight'                        # restore keyboard backlight
}

listener {
    timeout = 330                                                           # 5.5min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'                     # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && ddcutil setvcp 5 1 # screen on when activity is detected
}
