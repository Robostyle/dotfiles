# BACKGROUND
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 10
    disable_loading_bar = false
}

# Time Hour
label {
    monitor =
    text = cmd[update:1000] echo "<span color='##FFB90099'>$(date +"%H")</span>"
    font_size = 160
    font_family = Michroma
    position = 0, -40
    halign = center
    valign = top
}


# Time Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<span color='##ffffff99'>$(date +"%M")</span>"
    font_size = 160
    font_family = Michroma
    position = 0, -240
    halign = center
    valign = top
}

# Day-Date-Month
label {
    monitor =
    text = cmd[update:1000] echo "<span color='##ffffff99'>$(date '+%A, ')</span><span color='##ffb90099'>$(date '+%d %B')</span>"
    font_size = 30
    font_family = Michroma
    position = 0, -500
    halign = center
    valign = top
}

# USER
label {
    monitor =
    text = <i>Hi,</i> <span size='x-large' color='##ffb90099'>$DESC</span>
    color = rgba(255, 255, 255, .65)
    font_size = 24
    position = 0, -10%
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 480, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Enter password</span></i>
    hide_input = false
    position = 0, -20%
    halign = center
    valign = center
}
